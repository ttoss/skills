# Guardian field kit — run /guardian review on a PR and record the run.
# Copy to .github/workflows/guardian-review.yml in YOUR repo. Requirements:
#   1. The guardian skill installed in the repo (npx skills add ttoss/skills --skill guardian --agent claude-code)
#   2. scripts/guardian-record.mjs copied from this kit into the repo
#   3. Secrets: ANTHROPIC_API_KEY; GUARDIAN_STATS_TOKEN (PAT with write access to your private stats repo)
#   4. Set STATS_REPO below to your private stats repo
#
# Gated by label to control token cost: add the `guardian` label to a PR to trigger.
name: guardian-review

on:
  pull_request:
    types: [labeled, synchronize]

env:
  STATS_REPO: YOUR_USER/guardian-stats # <-- your private stats repo

jobs:
  review:
    if: contains(github.event.pull_request.labels.*.name, 'guardian')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # guardian review diffs against the base branch

      - name: Checkout stats sink
        uses: actions/checkout@v4
        with:
          repository: ${{ env.STATS_REPO }}
          token: ${{ secrets.GUARDIAN_STATS_TOKEN }}
          path: .guardian-stats

      - name: Run /guardian review and record
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            /guardian review
            This is a non-interactive (headless) run: do not use AskUserQuestion menus — end with the text next-step line only.
            After producing the review output, record the run exactly once:
            GUARDIAN_STATS_FILE=.guardian-stats/stats.jsonl node scripts/guardian-record.mjs <<'EOF'
            <paste the full review output here>
            EOF
            Then post the review output as a PR comment.
          claude_args: '--allowedTools "Bash,Read,Grep,Glob"'

      - name: Push stats
        working-directory: .guardian-stats
        run: |
          git config user.name "guardian-stats"
          git config user.email "guardian-stats@users.noreply.github.com"
          git add stats.jsonl
          git diff --cached --quiet && echo "no run recorded" && exit 0
          git commit -m "record: ${{ github.repository }}#${{ github.event.pull_request.number }}"
          git push
